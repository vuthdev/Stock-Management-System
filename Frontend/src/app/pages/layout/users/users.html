@if (isModalOpen) {
  <app-adduser (close)="closeModal()" [isEdit]="isEdit" [userData]="currentUser"></app-adduser>
}

<div class="flex p-4 h-auto w-full">
  <div class="relative bg-black/5 rounded-xl p-4 w-full">
    @if(isLoading) {
      <div class="absolute top-0 left-0 right-0 z-1 flex justify-center items-center">
        @if(isLoading) {
          <mat-spinner></mat-spinner>
        }
      </div>
    }
    <div class="flex items-center justify-between">
      <h1 class="text-white font-semibold text-xl">Users</h1>
      <button mat-raised-button
              (click)="openAddModal()"
      ><mat-icon class="scale-70 mr-1" fontIcon="assignment_add"></mat-icon>Add</button>
    </div>
    <table mat-table [dataSource]="user" class="w-full mt-3 rounded-xl shadow-md overflow-hidden">
      <ng-container matColumnDef="image">
        <th mat-header-cell *matHeaderCellDef>Image</th>
        <td mat-cell *matCellDef="let u">
          <img
            [src]="u.image ? baseUrl + u.image : '/default-user.png'"
            alt="{{u.username}}"
            class="w-10 h-10 rounded-full object-cover border border-gray-300"
          >
        </td>
      </ng-container>

      <ng-container matColumnDef="username">
        <th mat-header-cell *matHeaderCellDef>Username</th>
        <td mat-cell *matCellDef="let u">{{u.username}}</td>
      </ng-container>

      <ng-container matColumnDef="password">
        <th mat-header-cell *matHeaderCellDef>Password</th>
        <td mat-cell *matCellDef="let u">{{u.password}}</td>
      </ng-container>

      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef>Email</th>
        <td mat-cell *matCellDef="let u">{{u.email}}</td>
      </ng-container>

      <ng-container matColumnDef="gender">
        <th mat-header-cell *matHeaderCellDef>Gender</th>
        <td mat-cell *matCellDef="let u">{{u.gender}}</td>
      </ng-container>

      <ng-container matColumnDef="created_date">
        <th mat-header-cell *matHeaderCellDef>Created</th>
        <td mat-cell *matCellDef="let u">{{u.created_date | date}}</td>
      </ng-container>

      <ng-container matColumnDef="action">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let u">
          <div class="flex">
            <button
              mat-button
              class="btn-edit"
              (click)="openEditModal(u)">
              <mat-icon class="scale-70 mr-1" fontIcon="edit"></mat-icon>Edit
            </button>
            <button
              mat-button
              (click)="deleteUser(u._id)"
              class="btn-delete ml-3">
              <mat-icon class="scale-70 mr-1" fontIcon="delete"></mat-icon>Delete
            </button>
          </div>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayColumn"></tr>
      <tr mat-row *matRowDef="let row; columns:displayColumn"></tr>
    </table>
    <mat-paginator [length]="resultsLength" [pageSize]="10" aria-label="Select page" class="mt-3 rounded-2xl"></mat-paginator>
  </div>
</div>
