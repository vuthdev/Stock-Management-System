@if (isModalOpen) {
  <app-addorder (close)="closeModal()" [isEdit]="isEdit" [orderData]="currentOrder"></app-addorder>
}

<div class="flex p-4 h-auto w-full">
  <div class="relative bg-black/5 rounded-xl p-4 w-full">
    <div class="absolute p-5 top-0 left-0 right-0 z-1 flex justify-center items-center">
      @if(isLoading) {
        <mat-spinner></mat-spinner>
      }
    </div>
    <div class="flex items-center justify-between">
      <h1 class="text-white font-semibold text-xl">Orders</h1>
      <button mat-raised-button
              (click)="openAddModal()"
      ><mat-icon class="scale-70 mr-1" fontIcon="assignment_add"></mat-icon>Add</button>
    </div>
    <table mat-table [dataSource]="order" class="w-full mt-3 rounded-xl shadow-md overflow-hidden">
      <ng-container matColumnDef="userId">
        <th mat-header-cell *matHeaderCellDef class="bg-orange-300">User</th>
        <td mat-cell *matCellDef="let o">{{o.userId.username}}</td>
      </ng-container>

      <ng-container matColumnDef="productId">
        <th mat-header-cell *matHeaderCellDef class="bg-orange-300">Product</th>
        <td mat-cell *matCellDef="let o">{{o.productId.name}}</td>
      </ng-container>

      <ng-container matColumnDef="quantity">
        <th mat-header-cell *matHeaderCellDef class="bg-orange-300">Quantity</th>
        <td mat-cell *matCellDef="let o">{{o.quantity}}</td>
      </ng-container>

      <ng-container matColumnDef="totalPrice">
        <th mat-header-cell *matHeaderCellDef class="bg-orange-300">Total Price</th>
        <td mat-cell *matCellDef="let o">{{o.totalPrice | currency}}</td>
      </ng-container>

      <ng-container matColumnDef="orderDate">
        <th mat-header-cell *matHeaderCellDef class="bg-orange-300">Order Date</th>
        <td mat-cell *matCellDef="let o">{{o.orderDate | date}}</td>
      </ng-container>

      <ng-container matColumnDef="action">
        <th mat-header-cell *matHeaderCellDef class="bg-orange-300">Actions</th>
        <td mat-cell *matCellDef="let o">
          <div class="flex">
            <button
              mat-button
              class="btn-edit"
              (click)="openEditModal(o)">
              <mat-icon class="scale-70 mr-1" fontIcon="edit"></mat-icon>Edit
            </button>
            <button
              mat-button
              (click)="deleteProduct(o._id)"
              class="btn-delete ml-3">
              <mat-icon class="scale-70 mr-1" fontIcon="delete"></mat-icon>Delete
            </button>
          </div>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
    <mat-paginator [length]="resultsLenght" [pageSize]="10" aria-label="Select page" class="mt-3 rounded-2xl">
    </mat-paginator>
  </div>
</div>
