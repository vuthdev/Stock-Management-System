@if (isModalOpen) {
  <app-addcategory (close)="closeModal()" [isEdit]="isEdit" [categoryData]="currentCategory"></app-addcategory>
}

<div class="flex p-4 h-auto w-full">
  <div class="relative rounded-xl p-4 w-full">
    @if(isLoading) {
      <div class="absolute top-0 left-0 right-0 z-1 flex justify-center items-center">
        @if(isLoading) {
          <mat-spinner></mat-spinner>
        }
      </div>
    }
    <div class="flex items-center justify-between">
      <h1 class="font-semibold text-white text-xl">Categories</h1>
      <button mat-raised-button
              (click)="openAddModal()"
      ><mat-icon class="scale-70 mr-1" fontIcon="assignment_add"></mat-icon>Add</button>
    </div>
    <table mat-table [dataSource]="category" class="w-full mt-3 rounded-xl overflow-hidden">
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let c">{{c.name}}</td>
      </ng-container>

      <ng-container matColumnDef="description">
        <th mat-header-cell *matHeaderCellDef>Description</th>
        <td mat-cell *matCellDef="let c">{{c.description}}</td>
      </ng-container>

      <ng-container matColumnDef="action">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let c">
          <div class="flex">
            <button
              mat-button
              (click)="openEditModal(c)"
              class="btn-edit">
              <mat-icon class="scale-70 mr-1" fontIcon="edit"></mat-icon>Edit
            </button>
            <button
              mat-button
              (click)="deleteProduct(c._id)"
              class="btn-delete ml-3">
              <mat-icon class="scale-70 mr-1" fontIcon="delete"></mat-icon>Delete
            </button>
          </div>
        </td>

      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayColumns"></tr>
      <tr mat-row *matRowDef="let row; columns:displayColumns"></tr>
    </table>
    <mat-paginator [length]="resultsLength" [pageSize]="10" aria-label="Select page" class="mt-3 rounded-2xl"></mat-paginator>
  </div>
</div>
