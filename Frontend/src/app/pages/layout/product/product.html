@if (isModalOpen) {
  <app-addproduct (close)="closeModal()" [isEdit]="isEdit" [productData]="currentProduct"></app-addproduct>
}

<div class="flex p-4 h-auto w-full">
  <div class="relative bg-black/5 rounded-xl p-4 w-full">
    <div class="absolute top-0 left-0 right-0 z-1 flex justify-center items-center">
      @if(isLoading) {
        <mat-spinner></mat-spinner>
      }
    </div>

    <div class="flex items-center justify-between">
      <h1 class="text-white font-semibold text-xl">Product</h1>
      <button mat-raised-button
              (click)="openAddModal()"
      ><mat-icon class="scale-70 mr-1" fontIcon="assignment_add"></mat-icon>Add</button>
    </div>
    <div class="w-full">
      <table mat-table [dataSource]="products" class="w-full mt-3 rounded-xl shadow-md overflow-hidden">
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef class="bg-orange-300">Name</th>
          <td mat-cell *matCellDef="let p">{{ p.name }}</td>
        </ng-container>

        <ng-container matColumnDef="description">
          <th mat-header-cell *matHeaderCellDef class="bg-orange-300">Description</th>
          <td mat-cell *matCellDef="let p">{{ p.description }}</td>
        </ng-container>

        <ng-container matColumnDef="category">
          <th mat-header-cell *matHeaderCellDef class="bg-orange-300">Category</th>
          <td mat-cell *matCellDef="let p">{{ p.category_id?.name }}</td>
        </ng-container>

        <ng-container matColumnDef="stock">
          <th mat-header-cell *matHeaderCellDef class="bg-orange-300">Stock</th>
          <td mat-cell *matCellDef="let p">{{ p.stock }}</td>
        </ng-container>

        <ng-container matColumnDef="price">
          <th mat-header-cell *matHeaderCellDef class="bg-orange-300">Price</th>
          <td mat-cell *matCellDef="let p">{{ p.price | currency }}</td>
        </ng-container>

        <ng-container matColumnDef="action">
          <th mat-header-cell *matHeaderCellDef class="text-center bg-orange-300">Actions</th>
          <td mat-cell *matCellDef="let p">
            <div class="flex">
              <button
                mat-button
                class="btn-edit"
                (click)="openEditModal(p)">
                <mat-icon class="scale-70 mr-1" fontIcon="edit"></mat-icon>Edit
              </button>
              <button
                mat-button
                (click)="deleteProduct(p._id)"
                class="btn-delete ml-3">
                <mat-icon class="scale-70 mr-1" fontIcon="delete"></mat-icon>Delete
              </button>
            </div>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
    </div>
    <mat-paginator [length]="resultsLength" [pageSize]="10" aria-label="Select page" class="mt-3 rounded-2xl"></mat-paginator>
  </div>
</div>
